<!DOCTYPE html>
<html>
<head>
    <title>Profile Card</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .card {
            width: 280px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            color: white;

            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);

            transition: transform 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        img {
            width: 80px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        h2 {
            margin: 10px 0;
        }

        p {
            font-size: 14px;
            opacity: 0.8;
        }

        button {
            margin-top: 10px;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            background: white;
            color: #333;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://via.placeholder.com/80" alt="profile">
        <h2>Lekha</h2>
        <p>ECE Student | Learning Developer</p>
        <button>Follow</button>
    </div>

</body>
</html>
